<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Dolce Vitta</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h2>Acceso Administrativo</h2>
      <form id="login-form">
        <div class="input-group">
          <label for="username"><i class="fas fa-user"></i> Usuario</label>
          <input type="text" id="username" required>
        </div>
        <div class="input-group">
          <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit">Ingresar</button>
      </form>
    </div>
  </div>

  <script>
    // Verificar si ya está logueado
    if (localStorage.getItem('admin_logged_in')) {
      window.location.href = 'admin.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      // Credenciales válidas
      const validCredentials = [
        { user: 'admin', pass: 'dolcevitta2025', role: 'admin' },
        { user: 'manager', pass: 'dolcevitta2025', role: 'manager' }
      ];

      const matchedUser = validCredentials.find(cred => 
        cred.user === username && cred.pass === password
      );

      if (matchedUser) {
        // Guardar sesión con información del usuario
        localStorage.setItem('admin_logged_in', 'true');
        localStorage.setItem('admin_user', JSON.stringify({
          username: matchedUser.user,
          role: matchedUser.role
        }));
        
        window.location.href = 'admin.html';
      } else {
        alert('Credenciales incorrectas');
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>
