<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Dolce Vitta</title>
   <link rel="stylesheet" href="css/login.css"> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header>
    <div class="logo">
      <span>DOLCE VITTA</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="cafeteria.html">Cafetería</a></li>
        <li><a href="recetas.html">Recetas</a></li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="login-container">
      <div class="login-header">
        <i class="fas fa-user-circle"></i>
        <h2>Accede a tu cuenta</h2>
        <p>Descubre recetas exclusivas y haz seguimiento de tus pedidos</p>
      </div>
      <form id="loginForm">
        <div class="input-group">
          <label for="username"><i class="fas fa-user"></i> Usuario:</label>
          <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
        </div>
        
        <div class="input-group">
          <label for="password"><i class="fas fa-lock"></i> Contraseña:</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
          <span id="togglePassword" class="password-toggle"><i class="fas fa-eye"></i></span>
        </div>
        
        <div class="remember-forgot">
          <label>
            <input type="checkbox" name="remember"> Recordarme
          </label>
          <a href="#" id="forgotPassword">¿Olvidaste tu contraseña?</a>
        </div>
        
        <button type="submit" class="login-btn">Iniciar Sesión</button>
        
        <div class="social-login">
          <p>O inicia sesión con:</p>
          <div class="social-icons">
            <a href="#" class="social-btn google"><i class="fab fa-google"></i></a>
            <a href="#" class="social-btn facebook"><i class="fab fa-facebook-f"></i></a>
          </div>
        </div>
      </form>
      <p class="register-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>.</p>
      
      <div id="loginMessage" class="message"></div>
    </section>
  </main>
  <footer>
    <p>© 2025 Dolce Vitta - Pastelería Artesanal</p>
  </footer>
  <script src="js/login.js"></script>
</body>
</html>
