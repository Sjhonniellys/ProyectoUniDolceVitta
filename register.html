<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Dolce Vitta</title>
  <link rel="stylesheet" href="css/register.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header>
    <div class="logo">
      <span>DOLCE VITTA</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="cafeteria.html">Cafetería</a></li>
        <li><a href="recetas.html">Recetas</a></li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="register-container">
      <div class="register-header">
        <i class="fas fa-user-plus"></i>
        <h2>Únete a nuestra comunidad</h2>
        <p>Regístrate para acceder a recetas exclusivas y descuentos especiales</p>
      </div>
      
      <!-- Formulario de registro -->
      <form id="registerForm" action="register.php" method="POST">
        <div class="input-group">
          <label for="reg-username"><i class="fas fa-user"></i> Usuario:</label>
          <input type="text" id="reg-username" name="username" placeholder="Crea un nombre de usuario" required>
        </div>
        
        <div class="input-group">
          <label for="reg-email"><i class="fas fa-envelope"></i> Email:</label>
          <input type="email" id="reg-email" name="email" placeholder="Ingresa tu email" required>
        </div>
        
        <div class="input-group password-container">
          <label for="reg-password"><i class="fas fa-lock"></i> Contraseña:</label>
          <input type="password" id="reg-password" name="password" placeholder="Crea una contraseña (mín. 6 caracteres)" required>
          <span id="toggleRegPassword" class="toggle-password">
            <i class="fas fa-eye"></i>
          </span>
        </div>
        
        <div class="input-group password-container">
          <label for="reg-confirm-password"><i class="fas fa-lock"></i> Confirmar Contraseña:</label>
          <input type="password" id="reg-confirm-password" name="confirm_password" placeholder="Confirma tu contraseña" required>
          <span id="toggleConfirmPassword" class="toggle-password">
            <i class="fas fa-eye"></i>
          </span>
        </div>
        
        <div class="terms">
          <label>
            <input type="checkbox" name="terms" required>
            Acepto los <a href="#">Términos y Condiciones</a> y la <a href="#">Política de Privacidad</a>
          </label>
        </div>
        
        <button type="submit" class="register-btn">Registrarse</button>
      </form>
      
      <p class="login-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>.</p>
      
      <div id="registerMessage" class="message"></div>
    </section>
  </main>
  <footer>
    <p>© 2025 Dolce Vitta - Pastelería Artesanal</p>
  </footer>
  <script src="js/register.js"></script>
</body>
</html>
